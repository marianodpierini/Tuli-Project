name: Deploy Tiny-Similarity ONNX Layer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-layer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # ----------------------
      # Crear estructura base
      # ----------------------
      - name: Create folder structure
        run: |
          mkdir -p layer/python/tiny_similarity

      # ----------------------------------------------
      # Descargar modelo Tiny-Similarity (ONNX + tokenizer)
      # ----------------------------------------------
      - name: Download Tiny-Similarity ONNX model
        env:
          HF_TOKEN: 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
        run: |
          echo "Bajando modelo ONNX..."

          curl -L -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/valhalla/tiny-similarity/resolve/main/model.onnx \
            -o layer/python/tiny_similarity/model.onnx

          curl -L -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/valhalla/tiny-similarity/resolve/main/config.json \
            -o layer/python/tiny_similarity/config.json

          curl -L -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/valhalla/tiny-similarity/resolve/main/tokenizer.json \
            -o layer/python/tiny_similarity/tokenizer.json

          curl -L -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/valhalla/tiny-similarity/resolve/main/vocab.txt \
            -o layer/python/tiny_similarity/vocab.txt

      # ----------------------------------------------
      # Instalar dependencias Linux-compatibles para Lambda
      # ----------------------------------------------
      - name: Install NumPy + ONNXRuntime into layer
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install numpy --target layer/python/
          python3 -m pip install onnxruntime --target layer/python/
          python3 -m pip install transformers --target layer/python/

      # ----------------------------------------------
      # Zip final del Layer
      # ----------------------------------------------
      - name: Zip layer
        run: |
          cd layer
          zip -r ../tiny_similarity_layer.zip .

      - name: Upload zip as workflow artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: tiny_similarity_layer.zip
          path: tiny_similarity_layer.zip

      # ----------------------------------------------
      # Publicar a AWS Lambda Layer
      # ----------------------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Publish Lambda Layer
        run: |
          aws lambda publish-layer-version \
            --layer-name TinySimilarityONNX \
            --compatible-runtimes python3.10 \
            --zip-file fileb://tiny_similarity_layer.zip
