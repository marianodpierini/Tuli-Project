name: Deploy SimCSE Tiny ONNX Layer

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-layer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create folder structure
        run: |
          mkdir -p layer/python
          mkdir -p layer/model

      - name: Download SimCSE-Tiny ONNX model + tokenizer
        env:
          HF_TOKEN: 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
        run: |
          echo "Downloading SimCSE Tiny (int8) model..."
          
          curl -L -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/eva00/SimCSE-tiny-roberta/resolve/main/model_int8.onnx \
            -o layer/model/simcse_tiny.onnx


          curl -L -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/eva00/SimCSE-tiny-roberta/resolve/main/tokenizer.json \
            -o layer/model/tokenizer.json


          curl -L -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/eva00/SimCSE-tiny-roberta/resolve/main/vocab.txt \
            -olayer/model/vocab.txt

      - name: Download ONNX Runtime Lite
        run: |
          echo "Downloading onnxruntime-lite wheel..."

          wget https://github.com/microsoft/onnxruntime/releases/download/v1.17.3/onnxruntime-lite-1.17.3-cp312-cp312-manylinux_2_28_x86_64.whl \
            -O ort.whl

      - name: Install onnxruntime-lite into layer
        run: |
          pip install ort.whl --target layer/python --no-cache-dir
          rm ort.whl

      - name: Clean unused files (reduces size)
        run: |
          find layer/python -name "*.dist-info" -exec rm -rf {} +
          find layer/python -name "tests" -exec rm -rf {} +

      - name: Zip layer
        run: |
          cd layer
          zip -r ../simcse_tiny_layer.zip .

      - name: Upload artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: simcse_tiny_layer.zip
          path: simcse_tiny_layer.zip

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Publish Lambda Layer
        run: |
          aws lambda publish-layer-version \
            --layer-name SimCSE-Tiny-ONNX \
            --compatible-runtimes python3.12 \
            --zip-file fileb://simcse_tiny_layer.zip
