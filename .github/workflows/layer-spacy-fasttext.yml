name: Deploy Tiny-Similarity ONNX Layers

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-layers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      #########################################
      # LAYER 1: Dependencias minimalistas
      #########################################
      - name: Create deps layer folder
        run: mkdir -p deps_layer/python/

      - name: Install minimal numpy + onnxruntime
        run: |
          python3 -m pip install --no-cache-dir numpy==1.26.4 --target deps_layer/python/
          python3 -m pip install --no-cache-dir onnxruntime==1.16.3 --target deps_layer/python/

      - name: Cleanup unnecessary files
        run: |
          find deps_layer/python/ -name "tests" -type d -exec rm -rf {} +
          find deps_layer/python/ -name "__pycache__" -type d -exec rm -rf {} +
          find deps_layer/python/ -name "*.dist-info" -type d -exec rm -rf {} +
          find deps_layer/python/onnxruntime -type f -size +8000k -delete

      - name: Zip deps layer
        run: |
          cd deps_layer
          zip -r ../tiny_similarity_deps.zip .


      #########################################
      # LAYER 2: Modelo ONNX + Tokenizer
      #########################################
      - name: Create model layer folder
        run: |
          mkdir -p model_layer/python/tiny_similarity

      - name: Download Tiny-Similarity model
        env:
          HF_TOKEN: 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
        run: |
          curl -L -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/valhalla/tiny-similarity/resolve/main/model.onnx \
            -o model_layer/python/tiny_similarity/model.onnx

          curl -L -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/valhalla/tiny-similarity/resolve/main/config.json \
            -o model_layer/python/tiny_similarity/config.json

          curl -L -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/valhalla/tiny-similarity/resolve/main/tokenizer.json \
            -o model_layer/python/tiny_similarity/tokenizer.json

          curl -L -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/valhalla/tiny-similarity/resolve/main/vocab.txt \
            -o model_layer/python/tiny_similarity/vocab.txt

      - name: Zip model layer
        run: |
          cd model_layer
          zip -r ../tiny_similarity_model.zip .

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiny_similarity_model.zip
          path: tiny_similarity_model.zip

      #########################################
      # Publish both Layers
      #########################################
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Publish Deps Layer
        run: |
          aws lambda publish-layer-version \
            --layer-name TinySimilarityDeps \
            --compatible-runtimes python3.10 \
            --zip-file fileb://tiny_similarity_deps.zip

      - name: Publish Model Layer
        run: |
          aws lambda publish-layer-version \
            --layer-name TinySimilarityModel \
            --compatible-runtimes python3.10 \
            --zip-file fileb://tiny_similarity_model.zip
