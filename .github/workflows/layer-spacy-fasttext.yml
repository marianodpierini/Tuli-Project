name: Build Lambda Layer - Spacy + FastText

on:
  workflow_dispatch:

jobs:
  build-layer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          sudo apt-get install -y cmake
          sudo apt-get install -y libffi-dev
          sudo apt-get install -y libssl-dev
          sudo apt-get install -y python3-dev
          sudo apt-get install -y libopenblas-dev liblapack-dev
          sudo apt-get install -y libxml2-dev libxslt1-dev
          sudo apt-get install -y zlib1g-dev libbz2-dev liblzma-dev
          sudo apt-get install -y libomp-dev

      - name: Create folder structure
        run: |
          mkdir -p python
          mkdir -p python/spacy_models

      - name: Install Python dependencies into layer
        run: |
          pip install spacy==3.7.2 -t python/
          pip install fasttext-wheel==0.9.2 -t python/

      - name: Download spaCy model
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/python
          python -m spacy download es_core_news_sm
          mv $(python - <<EOF
          import es_core_news_sm, pathlib
          print(pathlib.Path(es_core_news_sm.__file__).parent)
          EOF
          ) python/spacy_models/es_core_news_sm

      - name: Cleanup unnecessary files
        run: |
          find python/ -type d -name "__pycache__" -exec rm -r {} +
          find python/ -type d -name "tests" -exec rm -r {} +
          rm -rf python/*.dist-info
          rm -rf python/*.egg-info

      - name: Zip layer
        run: |
          zip -r spacy_fasttext_layer.zip python/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spacy-fasttext-layer
          path: spacy_fasttext_layer.zip
