name: Deploy Tiny-Similarity ONNX Layer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-layer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create folder structure
        run: |
          mkdir -p layer/python/tiny_similarity

      - name: Download Tiny-Similarity ONNX model
        env:
          HF_TOKEN: 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
        run: |
          echo "Descargando modelo..."
          wget https://huggingface.co/valhalla/tiny-similarity/resolve/main/model.onnx -O layer/python/tiny_similarity/model.onnx
          wget https://huggingface.co/valhalla/tiny-similarity/resolve/main/config.json -O layer/python/tiny_similarity/config.json
          wget https://huggingface.co/valhalla/tiny-similarity/resolve/main/tokenizer.json -O layer/python/tiny_similarity/tokenizer.json
          wget https://huggingface.co/valhalla/tiny-similarity/resolve/main/vocab.txt -O layer/python/tiny_similarity/vocab.txt

      - name: Zip layer
        run: |
          cd layer
          zip -r ../tiny_similarity_layer.zip .

      - name: Upload zip as workflow artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: tiny_similarity_layer.zip
          path: tiny_similarity_layer.zip

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Publish Lambda Layer
        run: |
          aws lambda publish-layer-version \
            --layer-name TinySimilarityONNX \
            --compatible-runtimes python3.11 \
            --zip-file fileb://tiny_similarity_layer.zip
